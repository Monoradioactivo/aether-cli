name: Bug report
description: Report something broken in the Aether CLI
labels: [ "bug", "triage" ]
body:
  - type: input
    id: cli-version
    attributes:
      label: Aether CLI version
      description: Run `aether --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node --version`
      placeholder: "v22.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug, the command you ran, and expected vs actual behavior.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Relevant CLI output, error messages, or stack traces.
      render: shell
