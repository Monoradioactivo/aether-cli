name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-name:
    name: Branch name policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate branch prefix
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ "$BRANCH" =~ ^dependabot/ ]]; then
            echo "Skipping branch name policy for Dependabot branch '$BRANCH'."
            exit 0
          fi
          if [[ ! "$BRANCH" =~ ^(feat|fix|chore|refactor|docs)/ ]]; then
            echo "::error::Branch '$BRANCH' must start with feat/, fix/, chore/, refactor/, or docs/"
            exit 1
          fi
          echo "Branch '$BRANCH' is valid."

  build:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [ 18, 20, 22 ]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build and typecheck
        run: npm run build
